# Render Blueprint - Radar DF Backend + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: radardf-db
    plan: free
    databaseName: radardf
    user: radardf_user

services:
  - type: web
    name: radardf-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radardf-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://hiuryvilanova.github.io,https://radar-df.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
